name: CI - Integration Staging

on:
  workflow_dispatch: {}
  push:
    branches: [ feature/backend-122-ci-staging, feature/backend-123-deploy-smoke ]
  pull_request:
    branches: [ main ]

jobs:
  integration-staging:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: staging
    steps:
      # --- STEP 1: CHECK IF SECRET IS SET ---
      # This step sets an output flag that subsequent steps can safely read
      - name: Check for Deploy Key
        id: check_key
        run: |
          if [ -z "${{ secrets.DEPLOY_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      # --- PIPELINE RUNS IF SECRET EXISTS ---
      - name: Checkout
        if: steps.check_key.outputs.has_key == 'true'
        uses: actions/checkout@v4

      - name: Setup PHP
        if: steps.check_key.outputs.has_key == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, xml, gd, zip

      - name: Get Composer cache
        if: steps.check_key.outputs.has_key == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        if: steps.check_key.outputs.has_key == 'true'
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Validate required secrets
        if: steps.check_key.outputs.has_key == 'true'
        run: |
          [ -z "$APP_KEY" ] && echo "Error: APP_KEY not set" && exit 1
          [ -z "$DB_HOST" ] && echo "Error: DB_HOST not set" && exit 1
          [ -z "$DB_DATABASE" ] && echo "Error: DB_DATABASE not set" && exit 1
          echo "✓ Required secrets validated"
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}

      - name: Write .env from secrets
        if: steps.check_key.outputs.has_key == 'true'
        run: |
          cat > .env <<'EOF'
          APP_ENV=staging
          APP_KEY=${{ secrets.APP_KEY }}
          DB_CONNECTION=${{ secrets.DB_CONNECTION }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          PAYOUT_GATEWAY=${{ secrets.PAYOUT_GATEWAY }}
          XENDIT_API_KEY=${{ secrets.XENDIT_API_KEY }}
          MIDTRANS_SERVER_KEY=${{ secrets.MIDTRANS_SERVER_KEY }}
          EOF

      - name: Run migrations on staging DB
        if: steps.check_key.outputs.has_key == 'true'
        run: php artisan migrate --force

      - name: Run tests
        if: steps.check_key.outputs.has_key == 'true'
        run: php artisan test --no-interaction --no-coverage

      # --- FALLBACK WARNING IF SECRET IS MISSING ---
      - name: Secrets not configured warning
        if: steps.check_key.outputs.has_key == 'false'
        run: |
          echo "Integration/staging job skipped: required secrets not found."
          echo "Set DEPLOY_KEY and other staging secrets in repository settings to enable this job."
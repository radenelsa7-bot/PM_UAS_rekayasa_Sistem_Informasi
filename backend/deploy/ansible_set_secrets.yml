---
- name: Set .env on target servers
  hosts: app
  become: yes
  vars:
    env_path: /var/www/tukangdekat/backend/.env
  # Option: use vaulted vars file. If you have an encrypted file at deploy/secrets/vault_env.yml,
  # run ansible-playbook with --ask-vault-pass or --vault-password-file.
  vars_files: []
  tasks:
    - name: Upload .env from controller to remote (from deploy/secrets/.env or vaulted vars)
      copy:
        src: ./secrets/.env
        dest: "{{ env_path }}"
        owner: www-data
        group: www-data
        mode: '0640'

    - name: (Optional) Upload vaulted env if present
      when: lookup('file', 'deploy/secrets/vault_env.yml', errors='ignore') is not none
      block:
        - name: Decrypt vaulted env into temporary file on controller
          command: ansible-vault view deploy/secrets/vault_env.yml
          register: vault_view

        - name: Write decrypted content to temp file
          copy:
            content: "{{ vault_view.stdout }}"
            dest: /tmp/.env_decrypted
            mode: '0600'

        - name: Upload decrypted env to target
          copy:
            src: /tmp/.env_decrypted
            dest: "{{ env_path }}"
            owner: www-data
            group: www-data
            mode: '0640'

        - name: Remove temp decrypted file
          file:
            path: /tmp/.env_decrypted
            state: absent

    - name: Restart php-fpm (if present)
      service:
        name: php7.4-fpm
        state: restarted
      ignore_errors: yes
---
# Example Ansible playbook to inject secrets into the application's .env
# Usage: ansible-playbook -i inventory deploy/ansible_set_secrets.yml --extra-vars "env_path=/var/www/tukangdekat/backend/.env xendit_key=sk_..."

- hosts: app_servers
  become: true
  vars:
    env_path: /var/www/tukangdekat/backend/.env
    xendit_key: ""
    payout_gateway: "xendit"
  tasks:
    - name: Ensure env directory exists
      file:
        path: "{{ env_path | dirname }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Backup existing .env if present
      copy:
        src: "{{ env_path }}"
        dest: "{{ env_path }}.bak-{{ ansible_date_time.iso8601_basic }}"
      when: ansible_facts['os_family'] is defined and ansible_facts['os_family'] != '' and lookup('file', env_path, errors='ignore') is not none

    - name: Template .env with secrets
      copy:
        dest: "{{ env_path }}"
        owner: www-data
        group: www-data
        mode: '0640'
        content: |
          APP_ENV=production
          APP_DEBUG=false
          PAYOUT_GATEWAY={{ payout_gateway }}
          XENDIT_API_KEY={{ xendit_key }}
      vars:
        payout_gateway: "{{ payout_gateway }}"
        xendit_key: "{{ xendit_key }}"

    - name: Restart systemd queue worker (if present)
      systemd:
        name: laravel-queue
        state: restarted
        enabled: yes
      when: ansible_service_mgr == 'systemd'

name: Backend Tests

on:
  push:
    branches:
      - main
      - feature/backend-123-deploy-smoke
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches:
      - main
      - feature/backend-123-deploy-smoke
      - develop
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Backend Test Suite
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pm_uas_test
          MYSQL_USER: app_user
          MYSQL_PASSWORD: app_password
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Diperbarui ke v4 agar up-to-date

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Diperbarui ke v3

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker compose build app

      - name: Start Docker services
        working-directory: ./backend
        run: |
          docker compose up -d
          sleep 10  # Memberi waktu agar DB MySQL siap menerima koneksi

      - name: Run database migrations
        working-directory: ./backend
        run: |
          docker compose run --rm app php artisan migrate --force

      - name: Run test suite
        working-directory: ./backend
        run: |
          docker compose run --rm app php artisan test --no-coverage

      - name: Run payment webhook tests
        working-directory: ./backend
        if: always()
        run: |
          docker compose run --rm app php artisan test --filter=PaymentWebhookTest

      - name: Run smoke tests
        working-directory: ./backend
        if: always()
        run: |
          docker compose run --rm app php artisan test --filter=SmokeTestFeature

      - name: Check database schema
        working-directory: ./backend
        if: always()
        run: |
          docker compose exec -T app php artisan schema:dump --prune

      - name: Collect logs on failure
        if: failure()
        working-directory: ./backend
        run: |
          docker compose logs app > app-logs.txt
          docker compose logs mysql > mysql-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4 # SOLUSI UTAMA: Diperbarui dari v3 ke v4
        with:
          name: logs-${{ github.run_id }}
          path: |
            backend/app-logs.txt
            backend/mysql-logs.txt
          retention-days: 7

      - name: Cleanup Docker services
        if: always()
        working-directory: ./backend
        run: |
          docker compose down -v

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7 # Diperbarui ke v7
        with:
          script: |
            const testStatus = '${{ job.status }}' === 'success' ? '✅ PASS' : '❌ FAIL';
            const comment = `
            ## Backend Test Results ${testStatus}
            
            - **Status**: ${{ job.status }}
            - **Branch**: ${{ github.head_ref }}
            - **Commit**: ${{ github.sha }}
            - **Timestamp**: ${new Date().toISOString()}
            
            ### Test Suites
            - Full test suite
            - PaymentWebhookTest
            - SmokeTestFeature
            
            For detailed logs, see [Actions Run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  notify:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    name: Send Notifications

    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ Backend tests passed!" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Backend tests failed! Check logs." >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0 # Diperbarui ke versi stabil terbaru
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.message }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Backend Test Workflow*\n${{ steps.status.outputs.message }}\n*Branch:* ${{ github.head_ref || github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Fail if tests failed
        if: needs.test.result != 'success'
        run: exit 1